<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="w-[100vw] h-[100vh] bg-[linear-gradient(to_right,_#fdf6e3,_#cbd5e1)] flex items-center justify-center"> 

    <div class="m-5 p-5 w-[40vw] h-fit rounded-2xl text-center text-slate-900 shadow-2xl flex flex-col gap-8">
        <div class="text-6xl font-medium flex flex-col gap-1">TIMER
            <hr>
        </div>
        <div id="timer" class="text-9xl  ">00:00</div>

        <div class="">
            <button
                class="w-28 rounded-2xl border border-gray-800 p-3 text-[18px] bg-slate-100 hover:bg-slate-200 active:bg-slate-300"
                id="start">Start</button>
            <button
                class="w-28 rounded-2xl border border-gray-800 p-3 text-[18px] bg-slate-100 hover:bg-slate-200 active:bg-slate-300"
                id="stop">Stop</button>
            <button
                class="w-28 rounded-2xl border border-gray-800 p-3 text-[18px] bg-slate-100 hover:bg-slate-200 active:bg-slate-300"
                id="reset">Reset</button>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
